{% extends 'base.html' %}

{% block title %}Product Not Found - Live Bakery{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-16 text-center">
    <div class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-12 h-12 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.35 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
    </div>
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Product Not Found</h1>
    <p class="text-gray-600 mb-8">The product you're looking for is not available or doesn't exist.</p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="{% url 'products:product_list' %}" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
            Browse All Products
        </a>
        <a href="{% url 'core:home' %}" class="border border-gray-300 text-gray-600 hover:bg-gray-50 font-bold py-3 px-6 rounded-lg transition duration-200">
            Go Home
        </a>
    </div>
</div>
{% endblock %}
